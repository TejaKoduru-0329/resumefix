{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - ResumeFix.ai</title>
    <link rel="stylesheet" href="{% static 'core/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/login.css' %}">
</head>
<body>
    <style>
    .back-link {
        color: #888;
        font-size: 0.88rem;
        text-decoration: none;
        transition: color 0.2s;
    }
    .back-link:hover {
        color: #00b4d8;
    }
    .password-wrapper {
        position: relative;
    }
    .password-wrapper .toggle-eye {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #888;
        font-size: 0.9rem;
    }
    .password-wrapper .toggle-eye:hover {
        color: #333;
    }
    .back-home-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 8px;
    background: #eaecee;
    color: #555;
    text-decoration: none;
    font-size: 0.88rem;
    box-shadow: 3px 3px 8px #c1c8d3, -3px -3px 8px #fff;
    transition: all 0.2s;
    }
    .back-home-btn:hover {
        color: #00b4d8;
        box-shadow: -2px -2px 8px rgba(0,180,216,0.3), 2px 2px 8px rgba(0,180,216,0.3);
    }
</style>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card">
                    <h3 class="gradient-text text-center mb-4 fw-bold">Change Password</h3>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert {% if 'error' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% else %}alert-info{% endif %} alert-dismissible fade show custom-alert" role="alert">
                                <span>{{ message }}</span>
                                <button type="button" class="custom-close" data-bs-dismiss="alert" aria-label="Close">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST" action="{% url 'change_password' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Current Password<span>*</span></label>
                            <div class="password-wrapper">
                                <input type="password" name="old_password" class="form-control" id="oldPass" required>
                                <i class="fa-solid fa-eye toggle-eye" onclick="togglePass('oldPass', this)"></i>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password<span>*</span></label>
                            <div class="password-wrapper">
                                <input type="password" name="new_password1" class="form-control" id="newPass1" required>
                                <i class="fa-solid fa-eye toggle-eye" onclick="togglePass('newPass1', this)"></i>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm New Password<span>*</span></label>
                            <div class="password-wrapper">
                                <input type="password" name="new_password2" class="form-control" id="newPass2" required>
                                <i class="fa-solid fa-eye toggle-eye" onclick="togglePass('newPass2', this)"></i>
                            </div>
                        </div>
                        <div class="text-center">
                            <button class="login-btn text-center">Change Password</button>
                        </div>

                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'main_home' %}" class="back-home-btn">
                            <i class="fa-solid fa-arrow-left"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'core/js/bootstrap.bundle.min.js' %}"></script>

    <script>
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
